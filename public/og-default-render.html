<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #f7f7f3;
        display: flex;
        font-family: Arial, Helvetica, sans-serif;
        height: 630px;
        justify-content: center;
        margin: 0;
        overflow: hidden;
        width: 1200px;
      }

      .card {
        align-items: center;
        background: #ffffff;
        border: 2px solid #deded6;
        border-radius: 42px;
        box-shadow: 0 26px 70px rgba(17, 24, 39, 0.12);
        display: grid;
        gap: 54px;
        grid-template-columns: 280px 1px 1fr;
        min-height: 392px;
        padding: 62px 70px;
        width: 1060px;
      }

      .mark {
        display: block;
        filter: drop-shadow(0 24px 34px rgba(141, 40, 228, 0.22));
        height: 266px;
        width: 266px;
      }

      .divider {
        background: #deded6;
        height: 192px;
        width: 1px;
      }

      .copy {
        min-width: 0;
      }

      h1 {
        color: #111827;
        font-size: 46px;
        font-weight: 900;
        letter-spacing: 6px;
        line-height: 1.18;
        margin: 0;
        text-transform: uppercase;
      }

      p {
        color: #4b5563;
        font-size: 29px;
        line-height: 1.32;
        margin: 34px 0 0;
      }

      strong {
        color: #8d28e4;
        display: block;
        font-size: 34px;
        margin-top: 28px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="mark" src="./aktyor-logo.svg" alt="Aktyor.az" />
      <div class="divider"></div>
      <section class="copy">
        <h1>Azərbaycan Aktyor<br />və Aktrisa Bazası</h1>
        <p>Aktyor və aktrisalar üçün kataloq, kastinq profilləri, rəqəmsal ID, QR və PDF təsdiq kart sistemi.</p>
        <strong>aktyor.az</strong>
      </section>
    </main>
  </body>
</html>
